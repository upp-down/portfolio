<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>周思霞 | Web Frontend Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="splash.css">
</head>
<body>

  <div class="splash" id="splash">

    <!-- 主内容 -->
    <div class="splash-body">
      <h1 class="splash-headline">
        A portal to the work of<br><em>Zhou Sixia</em>
      </h1>
      <button class="splash-cta" id="enterBtn">
        <span>Begin exploring</span>
        <span class="splash-cta-line"></span>
        <svg class="splash-cta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    <!-- 右下角信息 -->
    <div class="splash-footer">
      <span class="splash-footer-role">Web Frontend Developer</span>
      <span class="splash-footer-year">2025</span>
    </div>

    <!-- 左下角装饰线 -->
    <div class="splash-accent"></div>

  </div>

  <!-- 过渡 -->
  <script>
    document.getElementById('enterBtn').addEventListener('click', function () {
      document.getElementById('splash').classList.add('fade-out');
      setTimeout(function () { window.location.href = 'index.html'; }, 1000);
    });
  </script>

</body>
</html>
