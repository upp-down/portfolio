<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>周思霞 | Web Frontend Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Roboto Flex 可变字体（支持 wght/wdth/ital 轴） -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght@8..144,25..151,100..1000&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="splash.css">
</head>
<body>

  <div class="splash" id="splash">

    <!-- 主内容 -->
    <div class="splash-body">

      <!-- TextPressure 文字动效容器 -->
      <div class="tp-container" id="tpContainer1">
        <h1 class="tp-title" id="tpTitle1"></h1>
      </div>
      <div class="tp-container" id="tpContainer2">
        <h1 class="tp-title" id="tpTitle2"></h1>
      </div>

      <button class="splash-cta" id="enterBtn">
        <span>Begin exploring</span>
        <svg class="splash-cta-arrow" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M6 16h20M20 10l6 6-6 6"/>
        </svg>
      </button>
    </div>

    <!-- 右下角信息 -->
    <div class="splash-footer">
      <span class="splash-footer-role">WEB FRONTEND DEVELOPER</span>
      <span class="splash-footer-year">2026</span>
    </div>

    <!-- 左下角装饰线 -->
    <div class="splash-accent"></div>

  </div>

  <script>
    // =============================================
    // TextPressure - 严格按 ReactBits 原始代码移植
    // 保留全部动画曲线和延迟参数
    // 两行独立实例，共享鼠标状态
    // =============================================
    (function () {
      'use strict';

      const TEXT_COLOR = '#1C1C1A';
      const WIDTH = true;
      const WEIGHT = true;
      const ITALIC = true;
      const ALPHA = false;
      const MIN_FONT_SIZE = 20;

      // 原始工具函数
      function dist(a, b) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function getAttr(distance, maxDist, minVal, maxVal) {
        const val = maxVal - Math.abs((maxVal * distance) / maxDist);
        return Math.max(minVal, val + minVal);
      }

      function debounce(func, delay) {
        let timeoutId;
        return function () {
          clearTimeout(timeoutId);
          timeoutId = setTimeout(func, delay);
        };
      }

      // 共享鼠标状态
      const mouseRef = { x: 0, y: 0 };
      const cursorRef = { x: 0, y: 0 };
      let isHovering = false;  // 鼠标是否在文字区域内

      window.addEventListener('mousemove', function (e) {
        cursorRef.x = e.clientX;
        cursorRef.y = e.clientY;
      });
      window.addEventListener('touchmove', function (e) {
        const t = e.touches[0];
        cursorRef.x = t.clientX;
        cursorRef.y = t.clientY;
      }, { passive: true });

      // 初始化鼠标位置
      const initRect = document.getElementById('tpContainer1').getBoundingClientRect();
      mouseRef.x = initRect.left + initRect.width / 2;
      mouseRef.y = initRect.top + initRect.height / 2;
      cursorRef.x = mouseRef.x;
      cursorRef.y = mouseRef.y;

      // 检测鼠标是否在文字区域内（两个容器的合并区域）
      function checkHover() {
        const r1 = document.getElementById('tpContainer1').getBoundingClientRect();
        const r2 = document.getElementById('tpContainer2').getBoundingClientRect();
        const padding = 40;  // 扩大检测范围
        const top = Math.min(r1.top, r2.top) - padding;
        const bottom = Math.max(r1.bottom, r2.bottom) + padding;
        const left = Math.min(r1.left, r2.left) - padding;
        const right = Math.max(r1.right, r2.right) + padding;
        const cx = cursorRef.x;
        const cy = cursorRef.y;
        isHovering = (cx >= left && cx <= right && cy >= top && cy <= bottom);
      }

      window.addEventListener('mousemove', checkHover);
      window.addEventListener('touchmove', checkHover, { passive: true });

      // 创建单行 TextPressure
      function createLine(containerId, titleId, text) {
        const container = document.getElementById(containerId);
        const title = document.getElementById(titleId);
        const chars = text.split('');
        const spansRef = [];

        chars.forEach(function (char) {
          const span = document.createElement('span');
          span.textContent = char;
          span.setAttribute('data-char', char);
          span.style.display = 'inline-block';
          span.style.color = TEXT_COLOR;
          title.appendChild(span);
          spansRef.push(span);
        });

        function setSize() {
          if (!container || !title) return;
          const containerW = container.getBoundingClientRect().width;
          let newFontSize = containerW / (chars.length / 2);
          newFontSize = Math.max(newFontSize, MIN_FONT_SIZE);
          title.style.fontSize = newFontSize + 'px';
        }

        const debouncedSetSize = debounce(setSize, 100);
        debouncedSetSize();
        window.addEventListener('resize', debouncedSetSize);

        return { title: title, spansRef: spansRef };
      }

      // 创建两行
      const line1 = createLine('tpContainer1', 'tpTitle1', 'A PORTAL TO THE WORK OF');
      const line2 = createLine('tpContainer2', 'tpTitle2', 'ZHOU SI XIA');

      // 原始动画循环（保留 lerp 因子 15）
      function animate() {
        mouseRef.x += (cursorRef.x - mouseRef.x) / 15;
        mouseRef.y += (cursorRef.y - mouseRef.y) / 15;

        [line1, line2].forEach(function (line) {
          if (!line.title) return;
          const titleRect = line.title.getBoundingClientRect();
          const maxDist = titleRect.width / 2;

          line.spansRef.forEach(function (span) {
            if (!span) return;

            // 鼠标不在文字区域时，重置为默认值
            if (!isHovering) {
              const defaultSettings = "'wght' 100, 'wdth' 100, 'ital' 0";
              if (span.style.fontVariationSettings !== defaultSettings) {
                span.style.fontVariationSettings = defaultSettings;
              }
              return;
            }

            const rect = span.getBoundingClientRect();
            const charCenter = {
              x: rect.x + rect.width / 2,
              y: rect.y + rect.height / 2
            };
            const d = dist(mouseRef, charCenter);

            const wdth = WIDTH ? Math.floor(getAttr(d, maxDist, 5, 200)) : 100;
            const wght = WEIGHT ? Math.floor(getAttr(d, maxDist, 100, 900)) : 400;
            const italVal = ITALIC ? getAttr(d, maxDist, 0, 1).toFixed(2) : 0;
            const alphaVal = ALPHA ? getAttr(d, maxDist, 0, 1).toFixed(2) : 1;

            const newSettings = "'wght' " + wght + ", 'wdth' " + wdth + ", 'ital' " + italVal;
            if (span.style.fontVariationSettings !== newSettings) {
              span.style.fontVariationSettings = newSettings;
            }
            if (ALPHA && span.style.opacity !== alphaVal) {
              span.style.opacity = alphaVal;
            }
          });
        });

        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    })();
  </script>

  <!-- 过渡 -->
  <script>
    document.getElementById('enterBtn').addEventListener('click', function () {
      document.getElementById('splash').classList.add('fade-out');
      setTimeout(function () { window.location.href = 'index.html'; }, 1000);
    });
  </script>

</body>
</html>
