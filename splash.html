<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>周思霞 | Web Frontend Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Roboto Flex 可变字体（支持 wght/wdth/ital 轴） -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght@8..144,25..151,100..1000&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="splash.css" />
  </head>
  <body>
    <div class="splash" id="splash">
      <!-- Grainient 动态背景 -->
      <div class="grainient-container" id="grainientBg"></div>

      <!-- 背景几何装饰 -->
      <div class="splash-shapes">
        <div class="shape shape-circle shape-1"></div>
        <div class="shape shape-circle shape-2"></div>
        <div class="shape shape-rect shape-3"></div>
        <div class="shape shape-circle shape-4"></div>
        <div class="shape shape-rect shape-5"></div>
        <div class="shape shape-circle shape-6"></div>
        <div class="shape shape-rect shape-7"></div>
        <div class="shape shape-circle shape-8"></div>
      </div>

      <!-- 主内容 -->
      <div class="splash-body">
        <!-- TextPressure 文字动效容器 -->
        <div class="tp-container" id="tpContainer1">
          <h1 class="tp-title" id="tpTitle1"></h1>
        </div>
        <div class="tp-container" id="tpContainer2">
          <h1 class="tp-title" id="tpTitle2"></h1>
        </div>

        <div class="splash-cta-wrap">
          <button class="splash-cta" id="enterBtn">
            <span>Begin exploring</span>
            <svg
              class="splash-cta-arrow"
              viewBox="0 0 32 32"
              fill="none"
              stroke="currentColor"
              stroke-width="1.2"
            >
              <path d="M6 16h20M20 10l6 6-6 6" />
            </svg>
          </button>
        </div>
      </div>

      <!-- 右下角信息 -->
      <div class="splash-footer">
        <span class="splash-footer-role">WEB FRONTEND DEVELOPER</span>
        <span class="splash-footer-year">2026</span>
      </div>

      <!-- 左下角装饰线 -->
      <div class="splash-accent"></div>
    </div>

    <!-- Grainient 动态背景 -->
    <script type="module">
      import { Renderer, Program, Mesh, Triangle } from 'https://esm.sh/ogl@1.0.11';

      const hexToRgb = hex => {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        if (!result) return [1, 1, 1];
        return [parseInt(result[1], 16) / 255, parseInt(result[2], 16) / 255, parseInt(result[3], 16) / 255];
      };

      // 原始 vertex shader（完全保留）
      const vertex = `#version 300 es
in vec2 position;
void main() {
  gl_Position = vec4(position, 0.0, 1.0);
}`;

      // 原始 fragment shader（完全保留）
      const fragment = `#version 300 es
precision highp float;
uniform vec2 iResolution;
uniform float iTime;
uniform float uTimeSpeed;
uniform float uColorBalance;
uniform float uWarpStrength;
uniform float uWarpFrequency;
uniform float uWarpSpeed;
uniform float uWarpAmplitude;
uniform float uBlendAngle;
uniform float uBlendSoftness;
uniform float uRotationAmount;
uniform float uNoiseScale;
uniform float uGrainAmount;
uniform float uGrainScale;
uniform float uGrainAnimated;
uniform float uContrast;
uniform float uGamma;
uniform float uSaturation;
uniform vec2 uCenterOffset;
uniform float uZoom;
uniform vec3 uColor1;
uniform vec3 uColor2;
uniform vec3 uColor3;
out vec4 fragColor;
#define S(a,b,t) smoothstep(a,b,t)
mat2 Rot(float a){float s=sin(a),c=cos(a);return mat2(c,-s,s,c);}
vec2 hash(vec2 p){p=vec2(dot(p,vec2(2127.1,81.17)),dot(p,vec2(1269.5,283.37)));return fract(sin(p)*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);float n=mix(mix(dot(-1.0+2.0*hash(i+vec2(0.0,0.0)),f-vec2(0.0,0.0)),dot(-1.0+2.0*hash(i+vec2(1.0,0.0)),f-vec2(1.0,0.0)),u.x),mix(dot(-1.0+2.0*hash(i+vec2(0.0,1.0)),f-vec2(0.0,1.0)),dot(-1.0+2.0*hash(i+vec2(1.0,1.0)),f-vec2(1.0,1.0)),u.x),u.y);return 0.5+0.5*n;}
void mainImage(out vec4 o, vec2 C){
  float t=iTime*uTimeSpeed;
  vec2 uv=C/iResolution.xy;
  float ratio=iResolution.x/iResolution.y;
  vec2 tuv=uv-0.5+uCenterOffset;
  tuv/=max(uZoom,0.001);

  float degree=noise(vec2(t*0.1,tuv.x*tuv.y)*uNoiseScale);
  tuv.y*=1.0/ratio;
  tuv*=Rot(radians((degree-0.5)*uRotationAmount+180.0));
  tuv.y*=ratio;

  float frequency=uWarpFrequency;
  float ws=max(uWarpStrength,0.001);
  float amplitude=uWarpAmplitude/ws;
  float warpTime=t*uWarpSpeed;
  tuv.x+=sin(tuv.y*frequency+warpTime)/amplitude;
  tuv.y+=sin(tuv.x*(frequency*1.5)+warpTime)/(amplitude*0.5);

  vec3 colLav=uColor1;
  vec3 colOrg=uColor2;
  vec3 colDark=uColor3;
  float b=uColorBalance;
  float s=max(uBlendSoftness,0.0);
  mat2 blendRot=Rot(radians(uBlendAngle));
  float blendX=(tuv*blendRot).x;
  float edge0=-0.3-b-s;
  float edge1=0.2-b+s;
  float v0=0.5-b+s;
  float v1=-0.3-b-s;
  vec3 layer1=mix(colDark,colOrg,S(edge0,edge1,blendX));
  vec3 layer2=mix(colOrg,colLav,S(edge0,edge1,blendX));
  vec3 col=mix(layer1,layer2,S(v0,v1,tuv.y));

  vec2 grainUv=uv*max(uGrainScale,0.001);
  if(uGrainAnimated>0.5){grainUv+=vec2(iTime*0.05);}
  float grain=fract(sin(dot(grainUv,vec2(12.9898,78.233)))*43758.5453);
  col+=(grain-0.5)*uGrainAmount;

  col=(col-0.5)*uContrast+0.5;
  float luma=dot(col,vec3(0.2126,0.7152,0.0722));
  col=mix(vec3(luma),col,uSaturation);
  col=pow(max(col,0.0),vec3(1.0/max(uGamma,0.001)));
  col=clamp(col,0.0,1.0);

  o=vec4(col,1.0);
}
void main(){
  vec4 o=vec4(0.0);
  mainImage(o,gl_FragCoord.xy);
  fragColor=o;
}`;

      // 初始化 Grainient
      const container = document.getElementById('grainientBg');
      if (container) {
        const renderer = new Renderer({
          webgl: 2,
          alpha: true,
          antialias: false,
          dpr: Math.min(window.devicePixelRatio || 1, 2)
        });
        const gl = renderer.gl;
        const canvas = gl.canvas;
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.display = 'block';
        container.appendChild(canvas);

        const geometry = new Triangle(gl);

        // 配色：暖黄橙色系（匹配 Splash 风格）
        const color1 = '#F8E9A1';  // 暖黄
        const color2 = '#FF9A76';  // 珊瑚橙
        const color3 = '#E8D5B7';  // 低饱和淡黄（替代亮白色）

        // 原始参数（完全保留默认值）
        const program = new Program(gl, {
          vertex,
          fragment,
          uniforms: {
            iTime:           { value: 0 },
            iResolution:     { value: new Float32Array([1, 1]) },
            uTimeSpeed:      { value: 0.25 },
            uColorBalance:   { value: 0.0 },
            uWarpStrength:   { value: 1.0 },
            uWarpFrequency:  { value: 5.0 },
            uWarpSpeed:      { value: 2.0 },
            uWarpAmplitude:  { value: 50.0 },
            uBlendAngle:     { value: 0.0 },
            uBlendSoftness:  { value: 0.05 },
            uRotationAmount: { value: 500.0 },
            uNoiseScale:     { value: 2.0 },
            uGrainAmount:    { value: 0.1 },
            uGrainScale:     { value: 2.0 },
            uGrainAnimated:  { value: 0.0 },
            uContrast:       { value: 1.2 },
            uGamma:          { value: 1.0 },
            uSaturation:     { value: 1.0 },
            uCenterOffset:   { value: new Float32Array([0, 0]) },
            uZoom:           { value: 0.9 },
            uColor1:         { value: new Float32Array(hexToRgb(color1)) },
            uColor2:         { value: new Float32Array(hexToRgb(color2)) },
            uColor3:         { value: new Float32Array(hexToRgb(color3)) }
          }
        });

        const mesh = new Mesh(gl, { geometry, program });

        const setSize = () => {
          const rect = container.getBoundingClientRect();
          const w = Math.max(1, Math.floor(rect.width));
          const h = Math.max(1, Math.floor(rect.height));
          renderer.setSize(w, h);
          program.uniforms.iResolution.value[0] = gl.drawingBufferWidth;
          program.uniforms.iResolution.value[1] = gl.drawingBufferHeight;
        };

        window.addEventListener('resize', setSize);
        setSize();

        // 原始渲染循环
        const t0 = performance.now();
        let raf;
        const loop = t => {
          program.uniforms.iTime.value = (t - t0) * 0.001;
          renderer.render({ scene: mesh });
          raf = requestAnimationFrame(loop);
        };
        raf = requestAnimationFrame(loop);

        // 清理
        window.addEventListener('beforeunload', () => {
          cancelAnimationFrame(raf);
          window.removeEventListener('resize', setSize);
          gl.getExtension('WEBGL_lose_context')?.loseContext();
        });
      }
    </script>

    <script>
      // =============================================
      // TextPressure - 严格按 ReactBits 原始代码移植
      // 保留全部动画曲线和延迟参数
      // 两行独立实例，共享鼠标状态
      // =============================================
      (function () {
        "use strict";

        const TEXT_COLOR = "#1C1C1A";
        const WIDTH = true;
        const WEIGHT = true;
        const ITALIC = true;
        const ALPHA = false;
        const MIN_FONT_SIZE = 20;

        // 原始工具函数
        function dist(a, b) {
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          return Math.sqrt(dx * dx + dy * dy);
        }

        function getAttr(distance, maxDist, minVal, maxVal) {
          const val = maxVal - Math.abs((maxVal * distance) / maxDist);
          return Math.max(minVal, val + minVal);
        }

        function debounce(func, delay) {
          let timeoutId;
          return function () {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(func, delay);
          };
        }

        // 共享鼠标状态
        const mouseRef = { x: 0, y: 0 };
        const cursorRef = { x: 0, y: 0 };
        const targetRef = { x: 0, y: 0 }; // 动画实际跟随的目标
        let isHovering = false;

        window.addEventListener("mousemove", function (e) {
          cursorRef.x = e.clientX;
          cursorRef.y = e.clientY;
        });
        window.addEventListener(
          "touchmove",
          function (e) {
            const t = e.touches[0];
            cursorRef.x = t.clientX;
            cursorRef.y = t.clientY;
          },
          { passive: true },
        );

        // 初始化鼠标位置
        const initRect = document
          .getElementById("tpContainer1")
          .getBoundingClientRect();
        const initCx = initRect.left + initRect.width / 2;
        const initCy = initRect.top + initRect.height / 2;
        mouseRef.x = initCx;
        mouseRef.y = initCy;
        cursorRef.x = initCx;
        cursorRef.y = initCy;
        targetRef.x = initCx;
        targetRef.y = initCy;

        // 检测鼠标是否在文字区域内
        function checkHover() {
          const r1 = document
            .getElementById("tpContainer1")
            .getBoundingClientRect();
          const r2 = document
            .getElementById("tpContainer2")
            .getBoundingClientRect();
          const padding = 40;
          const top = Math.min(r1.top, r2.top) - padding;
          const bottom = Math.max(r1.bottom, r2.bottom) + padding;
          const left = Math.min(r1.left, r2.left) - padding;
          const right = Math.max(r1.right, r2.right) + padding;
          isHovering =
            cursorRef.x >= left &&
            cursorRef.x <= right &&
            cursorRef.y >= top &&
            cursorRef.y <= bottom;
        }

        window.addEventListener("mousemove", checkHover);
        window.addEventListener("touchmove", checkHover, { passive: true });

        // 创建单行 TextPressure
        function createLine(containerId, titleId, text) {
          const container = document.getElementById(containerId);
          const title = document.getElementById(titleId);
          const chars = text.split("");
          const spansRef = [];

          chars.forEach(function (char) {
            const span = document.createElement("span");
            span.textContent = char;
            span.setAttribute("data-char", char);
            span.style.display = "inline-block";
            span.style.color = TEXT_COLOR;
            title.appendChild(span);
            spansRef.push(span);
          });

          function setSize() {
            if (!container || !title) return;
            const containerW = container.getBoundingClientRect().width;
            let newFontSize = containerW / (chars.length / 2);
            newFontSize = Math.max(newFontSize, MIN_FONT_SIZE);
            title.style.fontSize = newFontSize + "px";
          }

          const debouncedSetSize = debounce(setSize, 100);
          debouncedSetSize();
          window.addEventListener("resize", debouncedSetSize);

          return { title: title, spansRef: spansRef };
        }

        // 创建两行
        const line1 = createLine(
          "tpContainer1",
          "tpTitle1",
          "A PORTAL TO THE WORK OF",
        );
        const line2 = createLine("tpContainer2", "tpTitle2", "ZHOU SI XIA");

        // 默认状态值
        const DEFAULT_WDTH = 100;
        const DEFAULT_WGHT = 200;
        const DEFAULT_ITAL = 0;
        const LERP = 15; // 原始 lerp 因子

        // 每个 span 的当前插值状态
        function createSpanState() {
          return { wdth: DEFAULT_WDTH, wght: DEFAULT_WGHT, ital: DEFAULT_ITAL };
        }

        // 初始化所有 span 的状态
        function initSpanStates(line) {
          line.states = line.spansRef.map(function () {
            return createSpanState();
          });
        }

        initSpanStates(line1);
        initSpanStates(line2);

        // 原始动画循环
        function animate() {
          if (isHovering) {
            // 悬停：按原始逻辑计算目标值
            [line1, line2].forEach(function (line) {
              if (!line.title) return;
              const titleRect = line.title.getBoundingClientRect();
              const maxDist = titleRect.width / 2;

              line.spansRef.forEach(function (span, i) {
                if (!span) return;
                const rect = span.getBoundingClientRect();
                const charCenter = {
                  x: rect.x + rect.width / 2,
                  y: rect.y + rect.height / 2,
                };
                const d = dist(mouseRef, charCenter);

                const targetWdth = WIDTH
                  ? Math.floor(getAttr(d, maxDist, 5, 200))
                  : DEFAULT_WDTH;
                const targetWght = WEIGHT
                  ? Math.floor(getAttr(d, maxDist, 100, 900))
                  : DEFAULT_WGHT;
                const targetItal = ITALIC
                  ? parseFloat(getAttr(d, maxDist, 0, 1).toFixed(2))
                  : DEFAULT_ITAL;

                // 插值到目标
                line.states[i].wdth +=
                  (targetWdth - line.states[i].wdth) / LERP;
                line.states[i].wght +=
                  (targetWght - line.states[i].wght) / LERP;
                line.states[i].ital +=
                  (targetItal - line.states[i].ital) / LERP;
              });
            });

            // 跟随鼠标
            mouseRef.x += (cursorRef.x - mouseRef.x) / LERP;
            mouseRef.y += (cursorRef.y - mouseRef.y) / LERP;
          } else {
            // 离开：所有 span 平滑恢复到默认值
            [line1, line2].forEach(function (line) {
              line.states.forEach(function (state) {
                state.wdth += (DEFAULT_WDTH - state.wdth) / LERP;
                state.wght += (DEFAULT_WGHT - state.wght) / LERP;
                state.ital += (DEFAULT_ITAL - state.ital) / LERP;
              });
            });
          }

          // 应用当前状态到 DOM
          [line1, line2].forEach(function (line) {
            line.spansRef.forEach(function (span, i) {
              if (!span || !line.states[i]) return;
              const s = line.states[i];
              const settings =
                "'wght' " +
                Math.round(s.wght) +
                ", 'wdth' " +
                Math.round(s.wdth) +
                ", 'ital' " +
                s.ital.toFixed(2);
              if (span.style.fontVariationSettings !== settings) {
                span.style.fontVariationSettings = settings;
              }
            });
          });

          requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
      })();
    </script>

    <!-- 过渡 -->
    <script>
      document
        .getElementById("enterBtn")
        .addEventListener("click", function () {
          document.getElementById("splash").classList.add("fade-out");
          setTimeout(function () {
            window.location.href = "index.html";
          }, 1000);
        });
    </script>
  </body>
</html>
