<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>周思霞 | Web Frontend Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="splash.css">
</head>
<body>

  <div class="splash" id="splash">

    <!-- RippleGrid 背景 -->
    <div class="splash-bg" id="splashBg"></div>
    <div class="splash-veil"></div>

    <!-- 主内容 -->
    <div class="splash-body">
      <h1 class="splash-headline">
        A portal to the work of<br><em>Zhou Sixia</em>
      </h1>
      <button class="splash-cta" id="enterBtn">
        <span>Begin exploring</span>
        <span class="splash-cta-line"></span>
        <svg class="splash-cta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    <!-- 右下角信息 -->
    <div class="splash-footer">
      <span class="splash-footer-role">Web Frontend Developer</span>
      <span class="splash-footer-year">2025</span>
    </div>

    <!-- 左下角装饰线 -->
    <div class="splash-accent"></div>

  </div>

  <!-- RippleGrid（严格按原始代码，只改 gridColor） -->
  <script type="module">
    import { Renderer, Program, Triangle, Mesh } from 'https://esm.sh/ogl@1.0.11';

    const container = document.getElementById('splashBg');
    if (!container) { console.error('no container'); }
    else {
      const hexToRgb = hex => {
        const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return r ? [parseInt(r[1], 16) / 255, parseInt(r[2], 16) / 255, parseInt(r[3], 16) / 255] : [1, 1, 1];
      };

      let mousePos = { x: 0.5, y: 0.5 };
      let targetMouse = { x: 0.5, y: 0.5 };
      let mouseInfluence = 0;

      const renderer = new Renderer({ dpr: Math.min(window.devicePixelRatio, 2), alpha: true });
      const gl = renderer.gl;
      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
      gl.canvas.style.width = '100%';
      gl.canvas.style.height = '100%';
      container.appendChild(gl.canvas);

      const vert = `attribute vec2 position; varying vec2 vUv; void main() { vUv = position * 0.5 + 0.5; gl_Position = vec4(position, 0.0, 1.0); }`;

      const frag = `precision highp float;
uniform float iTime;
uniform vec2 iResolution;
uniform vec3 gridColor;
uniform float rippleIntensity;
uniform float gridSize;
uniform float gridThickness;
uniform float fadeDistance;
uniform float vignetteStrength;
uniform float glowIntensity;
uniform float opacity;
uniform vec2 mousePosition;
uniform float mouseInfluence;
uniform float mouseInteractionRadius;
varying vec2 vUv;
float pi = 3.141592;
void main() {
    vec2 uv = vUv * 2.0 - 1.0;
    uv.x *= iResolution.x / iResolution.y;
    float dist = length(uv);
    float func = sin(pi * (iTime - dist));
    vec2 rippleUv = uv + uv * func * rippleIntensity;
    if (mouseInfluence > 0.0) {
        vec2 mouseUv = mousePosition * 2.0 - 1.0;
        mouseUv.x *= iResolution.x / iResolution.y;
        float mouseDist = length(uv - mouseUv);
        float influence = mouseInfluence * exp(-mouseDist * mouseDist / (mouseInteractionRadius * mouseInteractionRadius));
        float mouseWave = sin(pi * (iTime * 2.0 - mouseDist * 3.0)) * influence;
        rippleUv += normalize(uv - mouseUv) * mouseWave * rippleIntensity * 0.3;
    }
    vec2 a = sin(gridSize * 0.5 * pi * rippleUv - pi / 2.0);
    vec2 b = abs(a);
    vec2 s = vec2(smoothstep(0.0, 0.5, b.x), smoothstep(0.0, 0.5, b.y));
    vec3 color = vec3(0.0);
    color += exp(-gridThickness * s.x * (0.8 + 0.5 * sin(pi * iTime)));
    color += exp(-gridThickness * s.y);
    color += 0.5 * exp(-(gridThickness / 4.0) * sin(s.x));
    color += 0.5 * exp(-(gridThickness / 3.0) * s.y);
    if (glowIntensity > 0.0) {
        color += glowIntensity * exp(-gridThickness * 0.5 * s.x);
        color += glowIntensity * exp(-gridThickness * 0.5 * s.y);
    }
    float ddd = exp(-2.0 * clamp(pow(dist, fadeDistance), 0.0, 1.0));
    vec2 vc = vUv - 0.5;
    float vd = length(vc);
    float vignette = clamp(1.0 - pow(vd * 2.0, vignetteStrength), 0.0, 1.0);
    vec3 t = gridColor;
    float finalFade = ddd * vignette;
    float alpha = length(color) * finalFade * opacity;
    gl_FragColor = vec4(color * t * finalFade * opacity, alpha);
}`;

      const uniforms = {
        iTime: { value: 0 },
        iResolution: { value: [1, 1] },
        gridColor: { value: hexToRgb('#C49A6C') },
        rippleIntensity: { value: 0.05 },
        gridSize: { value: 10.0 },
        gridThickness: { value: 15.0 },
        fadeDistance: { value: 1.5 },
        vignetteStrength: { value: 2.0 },
        glowIntensity: { value: 0.1 },
        opacity: { value: 1.0 },
        mousePosition: { value: [0.5, 0.5] },
        mouseInfluence: { value: 0 },
        mouseInteractionRadius: { value: 1.2 }
      };

      const geometry = new Triangle(gl);
      const program = new Program(gl, { vertex: vert, fragment: frag, uniforms });
      const mesh = new Mesh(gl, { geometry, program });

      const resize = () => {
        const { clientWidth: w, clientHeight: h } = container;
        renderer.setSize(w, h);
        uniforms.iResolution.value = [w, h];
      };

      container.addEventListener('mousemove', e => {
        const rect = container.getBoundingClientRect();
        targetMouse.x = (e.clientX - rect.left) / rect.width;
        targetMouse.y = 1.0 - (e.clientY - rect.top) / rect.height;
      });
      container.addEventListener('mouseenter', () => { mouseInfluence = 1.0; });
      container.addEventListener('mouseleave', () => { mouseInfluence = 0.0; });

      window.addEventListener('resize', resize);
      resize();

      const render = t => {
        uniforms.iTime.value = t * 0.001;
        mousePos.x += (targetMouse.x - mousePos.x) * 0.1;
        mousePos.y += (targetMouse.y - mousePos.y) * 0.1;
        uniforms.mouseInfluence.value += (mouseInfluence - uniforms.mouseInfluence.value) * 0.05;
        uniforms.mousePosition.value = [mousePos.x, mousePos.y];
        renderer.render({ scene: mesh });
        requestAnimationFrame(render);
      };
      requestAnimationFrame(render);
    }
  </script>

  <!-- 过渡 -->
  <script>
    document.getElementById('enterBtn').addEventListener('click', function () {
      document.getElementById('splash').classList.add('fade-out');
      setTimeout(function () { window.location.href = 'index.html'; }, 1000);
    });
  </script>

</body>
</html>
